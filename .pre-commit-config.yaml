# Pre-commit hooks — run local linters on every ``git commit`` so the
# same failures CI would catch happen one step earlier, with auto-fix.
#
# Setup (one-off, per developer):
#     pip install pre-commit
#     pre-commit install           # installs the git hook
#
# Run manually against the whole repo:
#     pre-commit run --all-files
#
# Skip for a single commit (emergency only):
#     git commit --no-verify

repos:
  # Generic hygiene — trailing whitespace, final newline, mixed line endings.
  # These are the rules that keep failing CI; catching them here means they
  # never reach a PR.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer          # adds the missing \n CI keeps flagging
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]               # force LF across Windows/mac/linux
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Ruff: same tool, same config, same rules as CI.
  # Running --fix here means the developer never has to do it manually.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
